name: Build Windows Executable

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # ручной запуск из вкладки Actions

permissions:
  contents: write       # нужно для создания Release при пуше тега

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build executable with PyInstaller
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name TunnelTrayManager `
            --icon=app.ico `
            --collect-submodules pystray `
            --collect-submodules PIL `
            --hidden-import kill_switch `
            tunnel_tray.py

      - name: Prepare release bundle
        run: |
          New-Item -ItemType Directory -Force -Path release-bundle | Out-Null
          Copy-Item dist/TunnelTrayManager.exe release-bundle/
          Copy-Item KILL_SWITCH.md release-bundle/
          if (Test-Path README.md) { Copy-Item README.md release-bundle/ }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TunnelTrayManager-${{ github.sha }}
          path: release-bundle/
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TunnelTrayManager.exe
            KILL_SWITCH.md
          draft: false
          prerelease: false
          generate_release_notes: true
